spring:
  application:
    name: glycowatch-backend
  profiles:
    default: local

  datasource:
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 1
    validate-on-migrate: true
    clean-disabled: true

server:
  port: ${PORT:${SERVER_PORT:8081}}

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration-minutes: ${JWT_ACCESS_EXPIRATION_MINUTES:15}
  refresh-token-expiration-days: ${JWT_REFRESH_EXPIRATION_DAYS:7}
  issuer: ${JWT_ISSUER:glycowatch-backend}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
