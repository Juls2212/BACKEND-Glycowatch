spring:
  application:
    name: glycowatch-backend
  profiles:
    default: local

  datasource:
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true
    clean-disabled: true

server:
  port: ${PORT:${SERVER_PORT:8081}}

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration-minutes: ${JWT_ACCESS_EXPIRATION_MINUTES:15}
  refresh-token-expiration-days: ${JWT_REFRESH_EXPIRATION_DAYS:7}
  issuer: ${JWT_ISSUER:glycowatch-backend}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  gemini:
    api-key: ${GEMINI_API_KEY:}
    model: ${GEMINI_MODEL:gemini-1.5-flash}
    base-url: ${GEMINI_BASE_URL:https://generativelanguage.googleapis.com}
  mqtt:
    enabled: ${MQTT_ENABLED:true}
    broker-url: ${MQTT_BROKER_URL:tcp://test.mosquitto.org:1883}
    client-id: ${MQTT_CLIENT_ID:glycowatch-backend-${random.uuid}}
    topic: ${MQTT_TOPIC:glycowatch/device/+}
    username: ${MQTT_USERNAME:}
    password: ${MQTT_PASSWORD:}
    completion-timeout-ms: ${MQTT_COMPLETION_TIMEOUT_MS:5000}
    reconnect-delay-ms: ${MQTT_RECONNECT_DELAY_MS:5000}
    qos: ${MQTT_QOS:1}
